<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Ali Hassan</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#021421,#031827);
color:white;
padding:20px;
}

/* CONTAINER */
.container{
max-width:1100px;
margin:auto;
background:rgba(3,24,39,.9);
backdrop-filter:blur(15px);
border:1px solid rgba(56,189,248,.25);
border-radius:25px;
padding:40px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:42px;
color:#38bdf8;
}

.header p{
color:#94a3b8;
margin-top:8px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

/* BOXES */
.info-box,
.form-box{
background:linear-gradient(145deg,#061f30,#04131f);
padding:25px;
border-radius:20px;
border:1px solid rgba(56,189,248,.2);
}

/* HEADINGS */
.info-box h2,
.form-box h2{
color:#38bdf8;
margin-bottom:15px;
}

/* INFO TEXT */
.info{
margin:12px 0;
color:#cbd5e1;
font-size:14px;
}

/* STATUS */
.status{
margin-top:15px;
padding:10px;
background:rgba(34,197,94,.15);
border:1px solid rgba(34,197,94,.4);
border-radius:10px;
color:#22c55e;
font-size:13px;
}

/* QUICK BUTTONS */
.quick{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.quick a{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
text-decoration:none;
font-size:13px;
font-weight:600;
transition:.3s;
min-width:100px;
}

.whatsapp{background:#22c55e;color:#021421}
.email{background:#38bdf8;color:#021421}
.call{border:1px solid #38bdf8;color:white}

.quick a:hover{
transform:scale(1.05);
}

/* FORM */
input,textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid rgba(56,189,248,.3);
background:#04131f;
color:white;
outline:none;
}

input:focus,textarea:focus{
border-color:#38bdf8;
box-shadow:0 0 10px rgba(56,189,248,.3);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
color:#021421;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #38bdf8;
}

/* MAP */
.map{
margin-top:30px;
height:260px;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(56,189,248,.3);
}

/* ================= RESPONSIVE ================= */

@media(max-width:992px){
.container{
padding:25px;
}
.header h1{
font-size:34px;
}
}

/* TABLET */
@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.header h1{
font-size:28px;
}

.quick{
flex-direction:column;
}

.quick a{
width:100%;
}

.map{
height:220px;
}
}

/* MOBILE SMALL */
@media(max-width:480px){

body{
padding:10px;
}

.container{
padding:20px;
border-radius:15px;
}

.header h1{
font-size:24px;
}

.info{
font-size:13px;
}

.map{
height:200px;
}
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<h1>Contact Me</h1>
<p>Let’s build something amazing together 🚀</p>
</div>

<!-- GRID -->
<div class="grid">

<!-- LEFT -->
<div class="info-box">
<h2>Get In Touch</h2>

<div class="info">📧 Email: alihassan532732@gmail.com</div>
<div class="info">📱 WhatsApp: +92 3190784209</div>
<div class="info">📍 Location: Jhang, Pakistan</div>
<div class="info">💼 Freelance: Available</div>

<div class="status">🟢 Usually responds within 1 hour</div>

<div class="quick">

<a class="whatsapp" href="https://wa.me/923190784209" target="_blank">WhatsApp</a>

<a class="email" href="mailto:alihassan532732@gmail.com?subject=Project Inquiry">Email</a>

<a class="call" href="tel:+923190784209">Call</a>

</div>

</div>

<!-- RIGHT -->
<div class="form-box">

<form>

</div>

</div>
</div>

</body>
</html>
